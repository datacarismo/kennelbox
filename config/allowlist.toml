[commands]
allowed = [
  "ls",
  "cat",
  "grep",
  "python3",
  "pip",
  "node",
  "npm",
  "git status",
  "git log",
  "git diff",
]
# Argument tokens that enable inline code execution — blocked regardless of base command.
# e.g. "python3 -c '...'" and "node -e '...'" are denied even though python3/node are allowed.
blocked_args = ["-c", "-e", "--eval", "--exec", "-x", "--command"]
# Advisory patterns: matched commands are logged as warnings but NOT blocked.
# The allowlist above is the only real access control.
warn_patterns = [
  "rm -rf",
  "sudo",
  "curl",
  "wget",
  "nc",
  "chmod 777",
  "mkfs",
  "dd",
  "shutdown",
  "reboot",
]

[limits]
# Resource caps enforced by the MCP server (bytes).
max_read_bytes = 10485760    # 10 MB — read_file refuses larger files
max_write_bytes = 10485760   # 10 MB — write_file refuses larger content
max_output_bytes = 1048576   # 1 MB — run_command stdout/stderr truncated beyond this

[files]
# Matched by file extension (suffix). Dotfiles and sensitive filenames
# (.env, .pem, .key, etc.) are denied unconditionally in code regardless of this list.
allowed_extensions = [
  ".py",
  ".js",
  ".ts",
  ".json",
  ".toml",
  ".yaml",
  ".md",
  ".txt",
]
